<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1E1E1E;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            background-color: #333;
            padding: 20px;
            margin: 50px auto;
            width: 80%;
            max-width: 600px;
            border-radius: 10px;
        }
        .title {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .payment-method {
            font-size: 20px;
            margin: 20px 0;
        }
        .qr-container img {
            max-width: 100%;
            border-radius: 10px;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .footer {
            margin-top: 30px;
        }
        .footer a {
            color: #007BFF;
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Pembayaran</h1>
        <p class="payment-method">QRIS</p>

        <div class="qr-container">
            <!-- Ganti dengan gambar QRIS yang sesuai -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/QRIS_Payment_Logo.svg/1024px-QRIS_Payment_Logo.svg.png" alt="QRIS">
        </div>

        <p class="payment-method">DANA</p>
        <p>085785247231</p>

        <!-- Tombol untuk menyalin nomor -->
        <button onclick="copyText()">Salin Nomor</button>

        <p>Setelah transfer, kirim bukti ya 🙏</p>
    </div>

    <div class="footer">
        <p>© 2026 DAXZZ STORE</p>
        <a href="https://wa.me/085785247231" target="_blank">Whatsapp</a>
        <a href="https://instagram.com/daxzzstore" target="_blank">Instagram</a>
        <a href="https://t.me/daxzzstore" target="_blank">Telegram</a>
    </div>

    <script>
        // Fungsi untuk menyalin nomor
        function copyText() {
            var text = document.getElementsByTagName("p")[1].innerText; // Mengakses teks nomor DANA
            navigator.clipboard.writeText(text);
            alert("Nomor berhasil disalin!");
        }
    </script>

</body>
</html>
