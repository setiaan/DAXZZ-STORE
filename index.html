<!DOCTYPE html>
<html>
<head>
  <title>Pembayaran</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Pembayaran</h2>

  <h3>QRIS</h3>
  <img src="qris.jpg">

  <hr>

  <h3>DANA</h3>
  <p id="nomor">085785247231</p>
  <button onclick="copyText()">Copy Nomor</button>

  <p>Setelah transfer, kirim bukti ya 🙏</p>
</div>

<script>
function copyText() {
  var text = document.getElementById("nomor").innerText;
  navigator.clipboard.writeText(text);
  alert("Nomor berhasil disalin!");
}
</script>

</body>
</html>
